[alembic]
script_location = alembic
# Overridden at runtime by hafiz.toml / HAFIZ_DATABASE__URL env var (see alembic/env.py).
# This fallback is only used if hafiz config is unavailable.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/hafiz

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
